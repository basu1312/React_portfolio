name: CI Pipeline

on:
  pull_request:
    branches: ['master', 'dev']

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout code (required for Sonar PR analysis)
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2. Setup Node (Vite requires Node 20+)
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # 3. Enable pnpm
      - name: Enable Corepack
        run: corepack enable

      # 4. Install dependencies
      - name: Install Dependencies
        run: pnpm install

      # 5. Lint (optional)
      - name: Lint
        run: pnpm run lint || echo "No lint configured"

      # 6. Build (Vite → dist/)
      - name: Build
        run: pnpm run build

      # 7. SonarCloud Scan
      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v2
        with:
          args: >
            -Dsonar.projectKey=basu1312_React_portfolio
            -Dsonar.organization=basu1312
            -Dsonar.sources=src
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io

      # 8. Quality Gate (FAIL PR if bad)
      - name: Sonar Quality Gate
        uses: SonarSource/sonarqube-quality-gate-action@v1
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      # 9. Upload build artifact
      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: react-build
          path: dist
