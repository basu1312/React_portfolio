name: CI Pipeline

on:
  push:
    branches: ['master']
  pull_request:
    branches: ['master']

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout code
      - name: Checkout Code
        uses: actions/checkout@v5

      # 2. Setup Node
      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: 'npm'

      # 3. Install dependencies
      - name: Install Dependencies
        run: npm ci

      # 4. Lint check (optional but recommended)
      - name: Run ESLint
        run: npm run lint

      # 5. Run tests (optional but recommended)
      - name: Run Tests
        run: npm test -- --watchAll=false

      # 6. Build project
      - name: Build
        run: npm run build
